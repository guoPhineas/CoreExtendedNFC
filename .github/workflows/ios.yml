name: iOS CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-tests:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Select iOS Simulator
        id: simulator
        run: echo "destination=$(./Scripts/select-ios-simulator.sh)" >> "$GITHUB_OUTPUT"

      - name: Run Swift Package Tests
        run: xcodebuild -scheme CoreExtendedNFC -destination '${{ steps.simulator.outputs.destination }}' test

  example-app-tests:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Select iOS Simulator
        id: simulator
        run: echo "destination=$(./Scripts/select-ios-simulator.sh)" >> "$GITHUB_OUTPUT"

      - name: Run Example App Unit and UI Tests
        run: xcodebuild -project Example/CENFC.xcodeproj -scheme CENFC -destination '${{ steps.simulator.outputs.destination }}' test CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=
